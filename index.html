<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="menu">
        <h1>RESIDENT ARRAY</h1>
        <button id="start" onclick="startGame()">Start</button>
        <button id="controls">Controls</button>
        <div id="controlsOverlay" class="overlay">
            <div class="overlay-content">
                <h2>Controls</h2>
                <ul>
                    <li><strong>WSAD - Movement</strong> </li>
                    <li><strong>Space - Slash</strong> </li>
                    <li><strong>Enter - Confirm</strong> </li>
                    
                </ul>
                <button id="closeControls">Back to Menu</button>
            </div>
        </div>
    </div>
    <div id="deathScreen" style="display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0, 0, 0, 0.85); color: white; flex-direction: column; justify-content: center; align-items: center; z-index: 100; font-family: monospace;">
        <h1 style="font-size: 64px; color: #ff3333; margin-bottom: 20px;">YOU DIED</h1>
        <button id="restartBtn" style="padding: 15px 30px; font-size: 24px; cursor: pointer; background-color: #ffffff; border: none; font-weight: bold; font-family: monospace;">Restart Game</button>
      </div>

    <canvas id="game"></canvas>
    <script src="script.js"></script>


</body>


</html>
